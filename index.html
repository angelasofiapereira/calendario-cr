function fbToVisit(doc) {
  var f = doc.fields || {};
  var name = doc.name.split('/').pop();
  return {
    id: name,
    clientId: (f.clientId && f.clientId.stringValue) || '',
    group: (f.group && f.group.stringValue) || '',
    herdade: (f.herdade && f.herdade.stringValue) || '',
    date: (f.date && f.date.stringValue) || '',
    tecnico: (f.tecnico && f.tecnico.stringValue) || ''
  };
}

function visitToFb(v) {
  return {
    fields: {
      clientId: {stringValue: v.clientId || ''},
      group: {stringValue: v.group || ''},
      herdade: {stringValue: v.herdade || ''},
      date: {stringValue: v.date || ''},
      tecnico: {stringValue: v.tecnico || ''}
    }
  };
}

function setSyncBadge(state) {
  var b = document.getElementById('sync-badge');
  if (state === 'saving') { b.textContent = '● A guardar…'; b.className = 'sync-badge saving'; }
  else if (state === 'offline') { b.textContent = '● Sem ligação'; b.className = 'sync-badge offline'; }
  else { b.textContent = '● Em linha'; b.className = 'sync-badge'; }
}

function loadFromFirebase() {
  fetch(FB_URL + "/visits?key=" + FB_KEY + "&pageSize=300")
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.documents && data.documents.length > 0) {
        visits = data.documents.map(fbToVisit);
        setSyncBadge('online');
      } else {
        // First time - upload initial data
        uploadInitialData();
      }
      renderCalendar();
      if (selectedDay !== null) renderDayVisits();
    })
    .catch(function(e) {
      console.warn('Firebase offline:', e);
      setSyncBadge('offline');
    });
}

function uploadInitialData() {
  setSyncBadge('saving');
  var batch = INITIAL_VISITS.slice(0, 20); // upload in chunks
  var promises = INITIAL_VISITS.map(function(v) {
    return fetch(FB_URL + "/visits/" + encodeURIComponent(v.id) + "?key=" + FB_KEY, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(visitToFb(v))
    });
  });
  Promise.all(promises).then(function() {
    setSyncBadge('online');
  }).catch(function(e){ setSyncBadge('offline'); });
}

function addToFirebase(v) {
  setSyncBadge('saving');
  return fetch(FB_URL + "/visits/" + encodeURIComponent(v.id) + "?key=" + FB_KEY, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(visitToFb(v))
  }).then(function(){ setSyncBadge('online'); loadFromFirebase(); })
    .catch(function(){ setSyncBadge('offline'); });
}

function updateInFirebase(v) {
  setSyncBadge('saving');
  return fetch(FB_URL + "/visits/" + encodeURIComponent(v.id) + "?key=" + FB_KEY, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(visitToFb(v))
  }).then(function(){ setSyncBadge('online'); loadFromFirebase(); })
    .catch(function(){ setSyncBadge('offline'); });
}

function deleteFromFirebase(id) {
  setSyncBadge('saving');
  return fetch(FB_URL + "/visits/" + encodeURIComponent(id) + "?key=" + FB_KEY, {
    method: 'DELETE'
  }).then(function(){ setSyncBadge('online'); loadFromFirebase(); })
    .catch(function(){ setSyncBadge('offline'); });
}

// ── Login ──────────────────────────────────────────────────────────────────
var userList = document.getElementById('user-list');
if(userList.children.length === 0) TODOS.forEach(function(u) {
  var btn = document.createElement('button');
  btn.className = 'user-btn' + (GESTORES.indexOf(u) >= 0 ? ' gestor' : '');
  btn.innerHTML = '<span style="font-size:18px">' + (TECNICOS.indexOf(u)>=0?'🌿':'📋') + '</span>' + u + '<span class="user-role">' + (TECNICOS.indexOf(u)>=0?'Técnico':'Gestor') + '</span>';
  btn.addEventListener('click', function(){ loginAs(u); });
  userList.appendChild(btn);
});

function loginAs(u) {
  currentUser = u;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-chip').textContent = u + (TECNICOS.indexOf(u)>=0?' 🌿':' 📋');
  renderFilters();
  renderLegend();
  renderCalendar();
  loadFromFirebase();
}

document.getElementById('logout-btn').addEventListener('click', function() {
  currentUser = null;
  visits = JSON.parse(JSON.stringify(INITIAL_VISITS));
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
});

// ── Calendário ─────────────────────────────────────────────────────────────
function parseDate(str) {
  if (!str) return null;
  var parts = str.split('/');
  return { day: parseInt(parts[0]), month: MONTH_MAP[parts[1].toLowerCase()] };
}

document.getElementById('prev-btn').addEventListener('click', function(){ month = Math.max(0,month-1); renderCalendar(); });
document.getElementById('next-btn').addEventListener('click', function(){ month = Math.min(11,month+1); renderCalendar(); });

function renderFilters() {
  var el = document.getElementById('filters');
  el.innerHTML = '';
  ['Todos'].concat(TECNICOS).forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (filterTecnico===t?' active':'');
    btn.textContent = t;
    btn.addEventListener('click', function(){ filterTecnico=t; renderFilters(); renderCalendar(); });
    el.appendChild(btn);
  });
}

function renderLegend() {
  var el = document.getElementById('legend');
  el.innerHTML = TECNICOS.map(function(t){
    var c = TCORES[t];
    return '<div class="legend-item"><div class="legend-dot" style="background:'+c.border+'"></div>'+t+'</div>';
  }).join('');
}

function renderCalendar() {
  document.getElementById('month-title').textContent = MESES[month] + ' ' + year;
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var today = new Date();

  var inMonth = visits.filter(function(v){
    var p = parseDate(v.date);
    if (!p || p.month !== month) return false;
    if (filterTecnico !== 'Todos' && v.tecnico !== filterTecnico) return false;
    return true;
  });

  document.getElementById('visit-count').textContent = inMonth.length + ' visita' + (inMonth.length!==1?'s':'');

  var byDay = {};
  inMonth.forEach(function(v){
    var p = parseDate(v.date);
    if (!p) return;
    if (!byDay[p.day]) byDay[p.day] = [];
    byDay[p.day].push(v);
  });

  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  for (var i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

  for (var d=1; d<=daysInMonth; d++) {
    var isToday = d===today.getDate() && month===today.getMonth() && year===today.getFullYear();
    var dayVs = byDay[d] || [];
    var cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday?' today':'');
    (function(day){
      cell.addEventListener('click', function(){ openDayModal(day); });
    })(d);

    var html = '<div class="day-num">'+d+'</div>';
    dayVs.slice(0,2).forEach(function(v){
      var c = TCORES[v.tecnico] || {bg:'#f1f5f9',border:'#94a3b8',text:'#334155'};
      var name = v.herdade.replace(/^Herdade (d[aeo] |do |da |das |dos )?/i,'').slice(0,12);
      html += '<span class="chip" style="background:'+c.bg+';color:'+c.text+';border-left:2px solid '+c.border+'">'+v.tecnico.split(' ')[0]+' · '+name+'</span>';
    });
    if (dayVs.length>2) html += '<span class="more">+' + (dayVs.length-2) + ' mais</span>';
    cell.innerHTML = html;
    grid.appendChild(cell);
  }
}

// ── Modais ─────────────────────────────────────────────────────────────────
function openDayModal(day) {
  selectedDay = day;
  document.getElementById('modal-day-header').innerHTML =
    '<div style="margin-bottom:16px"><div style="font-size:11px;color:#7a9e7a;letter-spacing:2px;text-transform:uppercase">'+MESES[month]+' '+year+'</div>' +
    '<div style="font-size:22px;font-weight:600;color:#1a2e1a;font-family:Lora,serif">Dia '+day+'</div></div>';
  renderDayVisits();
  document.getElementById('modal-day').style.display = 'flex';
}

function renderDayVisits() {
  var dayVs = visits.filter(function(v){
    var p = parseDate(v.date);
    return p && p.day===selectedDay && p.month===month;
  });
  var container = document.getElementById('modal-day-visits');
  if (dayVs.length===0) { container.innerHTML='<div class="empty">Sem visitas neste dia</div>'; return; }
  container.innerHTML = dayVs.map(function(v){
    var c = TCORES[v.tecnico] || {bg:'#f1f5f9',border:'#94a3b8',text:'#334155'};
    return '<div class="visit-row" style="background:'+c.bg+'">' +
      '<div class="visit-bar" style="background:'+c.border+'"></div>' +
      '<div style="flex:1;min-width:0"><div class="visit-name" style="color:'+c.text+'">'+v.herdade+'</div>' +
      '<div class="visit-sub">'+v.tecnico+' · '+v.group+'</div></div>' +
      '<button class="icon-btn" onclick="openEditModal(\''+v.id+'\')">✏️</button>' +
      '<button class="icon-btn" onclick="doDelete(\''+v.id+'\')">🗑️</button>' +
      '</div>';
  }).join('');
}

document.getElementById('close-day-btn').addEventListener('click', function(){ document.getElementById('modal-day').style.display='none'; });
document.getElementById('add-visit-btn').addEventListener('click', function(){
  populateSelects('add-herdade','add-tecnico',null);
  document.getElementById('modal-day').style.display='none';
  document.getElementById('modal-add').style.display='flex';
});
document.getElementById('cancel-add-btn').addEventListener('click', function(){ document.getElementById('modal-add').style.display='none'; });
document.getElementById('save-add-btn').addEventListener('click', function(){
  var herdade = document.getElementById('add-herdade').value;
  var tecnico = document.getElementById('add-tecnico').value;
  var mStr = Object.keys(MONTH_MAP).find(function(k){ return MONTH_MAP[k]===month; });
  var dateStr = String(selectedDay).padStart(2,'0')+'/'+mStr;
  var newV = { id:'NEW_'+Date.now(), clientId:'', group:HERDADE_GRUPO[herdade]||'', herdade:herdade, date:dateStr, tecnico:tecnico };
  visits.push(newV);
  renderCalendar();
  document.getElementById('modal-add').style.display='none';
  addToFirebase(newV);
});

document.getElementById('cancel-edit-btn').addEventListener('click', function(){ document.getElementById('modal-edit').style.display='none'; });
document.getElementById('save-edit-btn').addEventListener('click', function(){
  var id = document.getElementById('edit-id').value;
  var herdade = document.getElementById('edit-herdade').value;
  var tecnico = document.getElementById('edit-tecnico').value;
  visits = visits.map(function(v){ return v.id===id ? Object.assign({},v,{herdade:herdade,tecnico:tecnico,group:HERDADE_GRUPO[herdade]||v.group}) : v; });
  renderCalendar();
  renderDayVisits();
  document.getElementById('modal-edit').style.display='none';
  updateInFirebase({id:id, herdade:herdade, tecnico:tecnico, group:HERDADE_GRUPO[herdade]||''});
});
document.getElementById('delete-btn').addEventListener('click', function(){
  var id = document.getElementById('edit-id').value;
  if (!confirm('Eliminar esta visita?')) return;
  visits = visits.filter(function(v){ return v.id!==id; });
  renderCalendar();
  document.getElementById('modal-edit').style.display='none';
  deleteFromFirebase(id);
});

function openEditModal(id) {
  var v = visits.find(function(x){ return x.id===id; });
  if (!v) return;
  document.getElementById('edit-id').value = id;
  populateSelects('edit-herdade','edit-tecnico',v);
  document.getElementById('modal-day').style.display='none';
  document.getElementById('modal-edit').style.display='flex';
}

function doDelete(id) {
  if (!confirm('Eliminar esta visita?')) return;
  visits = visits.filter(function(v){ return v.id!==id; });
  renderCalendar();
  renderDayVisits();
  deleteFromFirebase(id);
}

function populateSelects(hEl, tEl, visit) {
  var hSel = document.getElementById(hEl);
  var tSel = document.getElementById(tEl);
  hSel.innerHTML = HERDADES.map(function(h){ return '<option'+(visit&&visit.herdade===h?' selected':'')+'>'+h+'</option>'; }).join('');
  tSel.innerHTML = TECNICOS.map(function(t){ return '<option'+(visit&&visit.tecnico===t?' selected':'')+'>'+t+'</option>'; }).join('');
  if (!visit && currentUser && TECNICOS.indexOf(currentUser)>=0) tSel.value = currentUser;
}

// Close modals on overlay click
document.getElementById('modal-day').addEventListener('click', function(e){ if(e.target===this) this.style.display='none'; });
document.getElementById('modal-add').addEventListener('click', function(e){ if(e.target===this) this.style.display='none'; });
document.getElementById('modal-edit').addEventListener('click', function(e){ if(e.target===this) this.style.display='none'; });
</script>
