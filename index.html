  .login-sub{font-size:13px;color:#8a9a8a;margin-bottom:28px;}

  .user-btn.gestor{background:#f0f4ff;border-color:#d4d8f4;}
  .user-btn:hover{transform:translateX(4px);} .user-btn:active{transform:translateX(4px);opacity:.8;}
  .user-role{margin-left:auto;font-size:11px;color:#9aaa9a;font-weight:300;}

  /* Header */
  #app{display:none;}
  .header{background:#fff;border-bottom:1px solid #e0ece0;padding:14px 20px;display:flex;align-items:center;gap:12;position:sticky;top:0;z-index:10;}

  .header-brand{font-size:11px;color:#7a9e7a;letter-spacing:2px;text-transform:uppercase;}
  .header-title{font-size:17px;font-weight:600;color:#1a2e1a;font-family:'Lora',serif;}
  .user-chip{font-size:13px;color:#5a7a5a;background:#f0f7f0;padding:6px 14px;border-radius:20px;white-space:nowrap;}
  .logout-btn{background:none;border:none;color:#9aaa9a;cursor:pointer;font-size:12px;font-family:inherit;padding:4px 8px;}

  /* Nav mês */
  .month-nav{padding:16px 20px 8px;display:flex;align-items:center;gap:12;flex-wrap:wrap;}
  .nav-btn{background:#fff;border:1.5px solid #c8dbc8;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;line-height:1;}
  .month-title{font-size:20px;font-weight:600;color:#1a2e1a;font-family:'Lora',serif;min-width:180px;text-align:center;}
  .visit-count{font-size:13px;color:#7a9e7a;margin-left:auto;}

  .filters{padding:0 20px 12px;display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;}
  .filter-btn{border:1.5px solid #c8dbc8;border-radius:20px;padding:5px 14px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;}
  .filter-btn.active{background:#3a7a3a;border-color:#3a7a3a;color:#fff;}

  /* Grid */
  .cal-wrap{padding:0 12px 24px;}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
  .weekday{text-align:center;font-size:11px;font-weight:600;color:#7a9e7a;padding:4px 0;letter-spacing:1px;}

  .day-cell{min-height:72px;background:#fff;border-radius:10px;padding:6px 6px 4px;border:1.5px solid #e8f0e8;cursor:pointer;transition:box-shadow .15s,transform .1s;}

  .day-cell.today .day-num{font-weight:700;color:#3a7a3a;}
  .chip{border-radius:6px;padding:2px 6px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-bottom:2px;}
  .more{font-size:9px;color:#9aaa9a;padding-left:4px;}

  /* Legenda */

  .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#5a7a5a;}
  .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

  /* Modal overlay */
  .modal-overlay{position:fixed;inset:0;background:#00000055;display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
  .modal-box{background:#fff;border-radius:18px;padding:28px 24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #00000030;}

  .modal-title{font-size:20px;font-weight:600;color:#1a2e1a;font-family:'Lora',serif;margin-bottom:20px;}
  .modal-sub{font-size:11px;color:#7a9e7a;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
  select,input[type=text]{border:1.5px solid #d4e6d4;border-radius:8px;padding:9px 12px;width:100%;margin-bottom:14px;font-size:14px;background:#fafcfa;font-family:inherit;}
  select:focus,input:focus{outline:2px solid #3a7a3a;outline-offset:1px;}
  .btn-row{display:flex;gap:10px;margin-top:8px;}
  .btn-green{background:#3a7a3a;color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;flex:1;}
  .btn-outline{background:#fff;color:#3a7a3a;border:1.5px solid #3a7a3a;border-radius:10px;padding:10px 20px;font-size:14px;cursor:pointer;font-family:inherit;flex:1;}
  .btn-red{background:#fee2e2;color:#dc2626;border:none;border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer;font-family:inherit;}
  .visit-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:8px;}
  .visit-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0;}

  .visit-sub{font-size:12px;color:#7a9e7a;}

  .loading{text-align:center;padding:60px 20px;color:#7a9e7a;font-size:15px;}
</style>

  document.getElementById('user-chip').textContent = u + (TECNICOS.includes(u) ? ' 🌿' : ' 📋');
  startListening();
  renderFilters();
  renderLegend();
  renderCalendar();
}

function logout() {
  if (unsubscribe) unsubscribe();
  currentUser = null;
  initialized = false;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── Firebase listener ──────────────────────────────────────────────────────
function setSyncBadge(state) {
  const b = document.getElementById('sync-badge');
  if (state === 'saving') { b.textContent = '● A guardar…'; b.className = 'sync-badge saving'; }
  else { b.textContent = '● Em linha'; b.className = 'sync-badge'; }
}

async function startListening() {
  const colRef = collection(db, 'visits');

  // Se primeira vez, carrega dados iniciais
  const metaRef = doc(db, 'meta', 'initialized');
  try {
    const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const metaSnap = await getDoc(metaRef);
    if (!metaSnap.exists()) {
      setSyncBadge('saving');
      // Carrega visitas iniciais do Excel
      for (const v of INITIAL_VISITS) {
        await setDoc(doc(db, 'visits', v.id), v);
      }
      await setDoc(metaRef, { initialized: true });
      setSyncBadge('online');
    }
  } catch(e) { console.warn('Meta check failed', e); }

  // Escuta mudanças em tempo real
  unsubscribe = onSnapshot(colRef, (snap) => {
    visits = snap.docs.map(d => ({ ...d.data(), id: d.id }));
    renderCalendar();
    if (selectedDay !== null) renderDayModal();
    setSyncBadge('online');
  }, (err) => {
    console.error(err);
  });
}

// ── Calendário ─────────────────────────────────────────────────────────────
function parseDate(str) {
  if (!str) return null;
  const [d, m] = str.split('/');
  return { day: parseInt(d), month: MONTH_MAP[m.toLowerCase()] };
}

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  ['Todos', ...TECNICOS].forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (filterTecnico === t ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => { filterTecnico = t; renderFilters(); renderCalendar(); };
    el.appendChild(btn);
  });
}

function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = TECNICOS.map(t => {
    const c = TECNICO_COLORS[t];
    return `<div class="legend-item"><div class="legend-dot" style="background:${c.border}"></div>${t}</div>`;
  }).join('');
}

function renderCalendar() {
  document.getElementById('month-title').textContent = MESES[month] + ' ' + year;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date();

  const visitsInMonth = visits.filter(v => {
    const p = parseDate(v.date);
    if (!p || p.month !== month) return false;
    if (filterTecnico !== 'Todos' && v.tecnico !== filterTecnico) return false;
    return true;
  });

  document.getElementById('visit-count').textContent = visitsInMonth.length + ' visita' + (visitsInMonth.length !== 1 ? 's' : '');

  const byDay = {};
  visitsInMonth.forEach(v => {
    const p = parseDate(v.date);
    if (!p) return;
    if (!byDay[p.day]) byDay[p.day] = [];
    byDay[p.day].push(v);
  });

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  for (let i = 0; i < firstDay; i++) {
    grid.appendChild(document.createElement('div'));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const dayVs = byDay[d] || [];
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' today' : '');
    cell.onclick = () => openDayModal(d);

    let chips = dayVs.slice(0,3).map(v => {
      const c = TECNICO_COLORS[v.tecnico] || DEFAULT_COLOR;
      const name = v.herdade.replace(/^Herdade (d[aeo] |do |da |das |dos )?/i,'').slice(0,14);
      return `<span class="chip" style="background:${c.bg};color:${c.text};border-left:2px solid ${c.border}">${v.tecnico.split(' ')[0]} · ${name}</span>`;
    }).join('');
    if (dayVs.length > 3) chips += `<span class="more">+${dayVs.length-3} mais</span>`;

    cell.innerHTML = `<div class="day-num">${d}</div>${chips}`;
    grid.appendChild(cell);
  }
}

function changeMonth(dir) {
  month = Math.max(0, Math.min(11, month + dir));
  renderCalendar();
}
window.changeMonth = changeMonth;

// ── Modal dia ──────────────────────────────────────────────────────────────
function openDayModal(day) {
  selectedDay = day;
  renderDayModal();
  document.getElementById('modal-day').style.display = 'flex';
}

function renderDayModal() {
  const dayVs = visits.filter(v => {
    const p = parseDate(v.date);
    return p && p.day === selectedDay && p.month === month;
  });

  document.getElementById('modal-day-header').innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-size:11px;color:#7a9e7a;letter-spacing:2px;text-transform:uppercase">${MESES[month]} ${year}</div>
      <div style="font-size:22px;font-weight:600;color:#1a2e1a;font-family:'Lora',serif">Dia ${selectedDay}</div>
    </div>`;

  const container = document.getElementById('modal-day-visits');
  if (dayVs.length === 0) {
    container.innerHTML = '<div class="empty">Sem visitas neste dia</div>';
    return;
  }
  container.innerHTML = dayVs.map(v => {
    const c = TECNICO_COLORS[v.tecnico] || DEFAULT_COLOR;
    return `<div class="visit-row" style="background:${c.bg};border:1px solid ${c.border}22">
      <div class="visit-bar" style="background:${c.border}"></div>
      <div style="flex:1;min-width:0">
        <div class="visit-name" style="color:${c.text}">${v.herdade}</div>
        <div class="visit-sub">${v.tecnico} · ${v.group}</div>
      </div>
      <button class="icon-btn" onclick="openEditModal('${v.id}')">✏️</button>
      <button class="icon-btn" onclick="confirmDelete('${v.id}')">🗑️</button>
    </div>`;
  }).join('');
}
