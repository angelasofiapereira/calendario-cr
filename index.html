<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Source+Sans+3:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3','Segoe UI',sans-serif;background:#f0f4f0;min-height:100vh;}

/* ── LOGIN ── */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lbox{background:#fff;border-radius:20px;padding:36px 28px;max-width:340px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.1);text-align:center;}
.lbrand{font-size:11px;letter-spacing:3px;color:#7a9e7a;text-transform:uppercase;margin-bottom:6px;}
.ltitle{font-size:24px;font-weight:600;color:#1a2e1a;font-family:'Lora',serif;margin-bottom:4px;}
.lsub{font-size:13px;color:#8a9a8a;margin-bottom:24px;}
.ubtn{width:100%;padding:14px 16px;margin-bottom:8px;border-radius:10px;border:1.5px solid #d4e6d4;background:#f4faf4;color:#1a2e1a;font-size:15px;cursor:pointer;font-family:inherit;font-weight:500;display:flex;align-items:center;gap:10px;touch-action:manipulation;}
.ubtn.g{background:#f0f4ff;border-color:#d4d8f4;}
.urole{margin-left:auto;font-size:11px;color:#9aaa9a;}

/* ── APP ── */
#app{display:none;}
.hdr{background:#fff;border-bottom:1px solid #e0ece0;padding:12px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10;}
.hdr-info{flex:1;}
.hdr-brand{font-size:10px;color:#7a9e7a;letter-spacing:2px;text-transform:uppercase;}
.hdr-title{font-size:15px;font-weight:600;color:#1a2e1a;font-family:'Lora',serif;}
.uchip{font-size:12px;color:#5a7a5a;background:#f0f7f0;padding:5px 12px;border-radius:20px;}
.sairbtn{background:none;border:none;color:#aaa;cursor:pointer;font-size:12px;font-family:inherit;padding:4px 8px;touch-action:manipulation;}
.sync{font-size:11px;padding:3px 10px;border-radius:20px;background:#f0f7f0;color:#5a8a5a;}
.sync.saving{background:#fef9c3;color:#a16207;}
.sync.err{background:#fee2e2;color:#dc2626;}

.mnav{padding:12px 16px 8px;display:flex;align-items:center;gap:8px;}
.navbtn{background:#fff;border:1.5px solid #c8dbc8;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:18px;line-height:1;touch-action:manipulation;}
.mtitle{font-size:18px;font-weight:600;color:#1a2e1a;font-family:'Lora',serif;flex:1;text-align:center;}
.vcount{font-size:12px;color:#7a9e7a;text-align:right;padding:0 16px 8px;}

.ftrs{padding:0 16px 10px;display:flex;gap:8px;overflow-x:auto;}
.fbtn{border:1.5px solid #c8dbc8;border-radius:20px;padding:5px 14px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;touch-action:manipulation;}
.fbtn.on{background:#3a7a3a;border-color:#3a7a3a;color:#fff;}

.cal{padding:0 10px 20px;}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.wd{text-align:center;font-size:10px;font-weight:600;color:#7a9e7a;padding:3px 0;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dcell{min-height:64px;background:#fff;border-radius:8px;padding:5px 4px;border:1.5px solid #e8f0e8;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:rgba(58,122,58,.15);}
.dcell.tod{border:2px solid #3a7a3a;}
.dnum{font-size:11px;color:#5a7a5a;margin-bottom:2px;}
.dcell.tod .dnum{font-weight:700;color:#3a7a3a;}
.chip{border-radius:4px;padding:1px 4px;font-size:9px;font-weight:600;display:block;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.more{font-size:8px;color:#9aaa9a;padding-left:2px;}

.leg{padding:0 16px 28px;display:flex;gap:10px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:12px;color:#5a7a5a;}
.ld{width:10px;height:10px;border-radius:3px;}

/* ── MODAIS ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0;}
.mbox{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;}
.mtit{font-size:20px;font-weight:600;color:#1a2e1a;font-family:'Lora',serif;margin-bottom:16px;}
.mlbl{font-size:11px;color:#7a9e7a;font-weight:600;letter-spacing:1px;margin-bottom:5px;display:block;}
select{border:1.5px solid #d4e6d4;border-radius:8px;padding:10px 12px;width:100%;margin-bottom:12px;font-size:15px;background:#fafcfa;font-family:inherit;}
.brow{display:flex;gap:8px;margin-top:12px;}
.bg{background:#3a7a3a;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:600;flex:1;touch-action:manipulation;}
.bo{background:#fff;color:#3a7a3a;border:1.5px solid #3a7a3a;border-radius:10px;padding:12px;font-size:15px;cursor:pointer;font-family:inherit;flex:1;touch-action:manipulation;}
.br{background:#fee2e2;color:#dc2626;border:none;border-radius:10px;padding:12px 14px;font-size:15px;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.vrow{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;margin-bottom:7px;}
.vbar{width:4px;height:38px;border-radius:2px;flex-shrink:0;}
.vname{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vsub{font-size:12px;color:#7a9e7a;}
.ibtn{background:none;border:none;cursor:pointer;font-size:20px;padding:6px;touch-action:manipulation;}
.empty{text-align:center;color:#9aaa9a;padding:28px 0;font-size:14px;}
</style>
</head>

function setSyc(s){
  var el=document.getElementById('sync');
  if(s==='s'){el.textContent='● A guardar…';el.className='sync saving';}
  else if(s==='e'){el.textContent='● Sem ligação';el.className='sync err';}
  else{el.textContent='● Em linha';el.className='sync';}
}

function fbLoad(){
  fetch(FB+"/visits?key="+KEY+"&pageSize=300")
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.documents&&d.documents.length>0){
        visits=d.documents.map(function(doc){
          var f=doc.fields||{};
          return{id:doc.name.split('/').pop(),
            group:(f.group&&f.group.stringValue)||'',
            herdade:(f.herdade&&f.herdade.stringValue)||'',
            date:(f.date&&f.date.stringValue)||'',
            tecnico:(f.tecnico&&f.tecnico.stringValue)||''};
        });
        setSyc('ok');
      } else {
        fbUploadAll();
      }
      renderCal();
      if(selDay)renderDayList();
    })
    .catch(function(){setSyc('e');});
}

function fbUploadAll(){
  setSyc('s');
  Promise.all(VDATA.map(function(v){
    return fetch(FB+"/visits/"+encodeURIComponent(v.id)+"?key="+KEY,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fields:{group:{stringValue:v.group},herdade:{stringValue:v.herdade},date:{stringValue:v.date},tecnico:{stringValue:v.tecnico}}})
    });
  })).then(function(){setSyc('ok');fbLoad();}).catch(function(){setSyc('e');});
}

function fbSave(v){
  setSyc('s');
  fetch(FB+"/visits/"+encodeURIComponent(v.id)+"?key="+KEY,{
    method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fields:{group:{stringValue:v.group||''},herdade:{stringValue:v.herdade},date:{stringValue:v.date},tecnico:{stringValue:v.tecnico}}})
  }).then(function(){setSyc('ok');fbLoad();}).catch(function(){setSyc('e');});
}

function fbDel(id){
  setSyc('s');
  fetch(FB+"/visits/"+encodeURIComponent(id)+"?key="+KEY,{method:'DELETE'})
    .then(function(){setSyc('ok');fbLoad();}).catch(function(){setSyc('e');});
}

function pd(s){if(!s)return null;var p=s.split('/');return{d:parseInt(p[0]),m:MM[p[1].toLowerCase()]};}

document.getElementById('prevbtn').addEventListener('click',function(){month=Math.max(0,month-1);renderCal();});
document.getElementById('nextbtn').addEventListener('click',function(){month=Math.min(11,month+1);renderCal();});

function renderFtrs(){
  var el=document.getElementById('ftrs');el.innerHTML='';
  ['Todos'].concat(TEC).forEach(function(t){
    var b=document.createElement('button');
    b.className='fbtn'+(filterTec===t?' on':'');
    b.textContent=t;
    b.addEventListener('click',function(){filterTec=t;renderFtrs();renderCal();});
    el.appendChild(b);
  });
}

function renderLeg(){
  document.getElementById('leg').innerHTML=TEC.map(function(t){
    var c=TC[t];
    return'<div class="li"><div class="ld" style="background:'+c.b+'"></div>'+t+'</div>';
  }).join('');
}

function renderCal(){
  document.getElementById('mtitle').textContent=MESES[month]+' 2026';
  var fd=new Date(2026,month,1).getDay();
  var dim=new Date(2026,month+1,0).getDate();
  var now=new Date();
  var vm=visits.filter(function(v){
    var p=pd(v.date);
    if(!p||p.m!==month)return false;
    if(filterTec!=='Todos'&&v.tecnico!==filterTec)return false;
    return true;
  });
  document.getElementById('vcount').textContent=vm.length+' visita'+(vm.length!==1?'s':'');
  var bd={};
  vm.forEach(function(v){var p=pd(v.date);if(!p)return;if(!bd[p.d])bd[p.d]=[];bd[p.d].push(v);});
  var g=document.getElementById('cgrid');g.innerHTML='';
  for(var i=0;i<fd;i++)g.appendChild(document.createElement('div'));
  for(var d=1;d<=dim;d++){
    var tod=d===now.getDate()&&month===now.getMonth()&&2026===now.getFullYear();
    var dv=bd[d]||[];
    var cell=document.createElement('div');
    cell.className='dcell'+(tod?' tod':'');
    (function(day){cell.addEventListener('click',function(){openDay(day);});})(d);
    var h='<div class="dnum">'+d+'</div>';
    dv.slice(0,2).forEach(function(v){
      var c=TC[v.tecnico]||{bg:'#f1f5f9',b:'#94a3b8',t:'#334155'};
      h+='<span class="chip" style="background:'+c.bg+';color:'+c.t+';border-left:2px solid '+c.b+'">'+
        v.tecnico.split(' ')[0]+' · '+v.herdade.replace(/^Herdade (d[aeoi] |do |da |das |dos )?/i,'').slice(0,11)+'</span>';
    });
    if(dv.length>2)h+='<span class="more">+'+(dv.length-2)+' mais</span>';
    cell.innerHTML=h;g.appendChild(cell);
  }
}

  document.getElementById('mdayhdr').innerHTML=
    '<div style="margin-bottom:14px"><div style="font-size:10px;color:#7a9e7a;letter-spacing:2px;text-transform:uppercase">'+MESES[month]+' 2026</div>'+
    '<div style="font-size:21px;font-weight:600;color:#1a2e1a;font-family:Lora,serif">Dia '+day+'</div></div>';
  renderDayList();
  document.getElementById('mdayov').style.display='flex';
}

function renderDayList(){
  var dv=visits.filter(function(v){var p=pd(v.date);return p&&p.d===selDay&&p.m===month;});
  var el=document.getElementById('mdaylist');
  if(!dv.length){el.innerHTML='<div class="empty">Sem visitas neste dia</div>';return;}
  el.innerHTML=dv.map(function(v){
    var c=TC[v.tecnico]||{bg:'#f1f5f9',b:'#94a3b8',t:'#334155'};
    return'<div class="vrow" style="background:'+c.bg+'">'+
      '<div class="vbar" style="background:'+c.b+'"></div>'+
      '<div style="flex:1;min-width:0"><div class="vname" style="color:'+c.t+'">'+v.herdade+'</div>'+
      '<div class="vsub">'+v.tecnico+' · '+v.group+'</div></div>'+
      '<button class="ibtn" onclick="openEdit(\''+v.id+'\')">✏️</button>'+
      '<button class="ibtn" onclick="doDelDay(\''+v.id+'\')">🗑️</button>'+
      '</div>';
  }).join('');
}

function openEdit(id){
  var v=visits.find(function(x){return x.id===id;});if(!v)return;
  document.getElementById('editid').value=id;
  fillSel('edith','editt',v);
  document.getElementById('mdayov').style.display='none';
  document.getElementById('meditov').style.display='flex';
}

function doDelDay(id){
  if(!confirm('Eliminar esta visita?'))return;
  visits=visits.filter(function(v){return v.id!==id;});
  renderCal();renderDayList();fbDel(id);
}

function fillSel(hid,tid,v){
  document.getElementById(hid).innerHTML=HERD.map(function(h){return'<option'+(v&&v.herdade===h?' selected':'')+'>'+h+'</option>';}).join('');
  document.getElementById(tid).innerHTML=TEC.map(function(t){return'<option'+(v&&v.tecnico===t?' selected':'')+'>'+t+'</option>';}).join('');
  if(!v&&user&&TEC.indexOf(user)>=0)document.getElementById(tid).value=user;
}

// Botões modal dia
document.getElementById('closedaybtn').addEventListener('click',function(){document.getElementById('mdayov').style.display='none';});
document.getElementById('addbtn').addEventListener('click',function(){
  fillSel('addh','addt',null);
  document.getElementById('mdayov').style.display='none';
  document.getElementById('maddov').style.display='flex';
});

// Botões modal add
document.getElementById('canceladdbtn').addEventListener('click',function(){document.getElementById('maddov').style.display='none';});
document.getElementById('saveaddbtn').addEventListener('click',function(){
  var h=document.getElementById('addh').value;
  var t=document.getElementById('addt').value;
  var mk=Object.keys(MM).find(function(k){return MM[k]===month;});
  var nv={id:'NEW_'+Date.now(),group:HG[h]||'',herdade:h,date:String(selDay).padStart(2,'0')+'/'+mk,tecnico:t};
  visits.push(nv);renderCal();
  document.getElementById('maddov').style.display='none';
  fbSave(nv);
});

// Botões modal edit
document.getElementById('canceleditbtn').addEventListener('click',function(){document.getElementById('meditov').style.display='none';});
document.getElementById('delbtn').addEventListener('click',function(){
  var id=document.getElementById('editid').value;
  if(!confirm('Eliminar esta visita?'))return;
  visits=visits.filter(function(v){return v.id!==id;});
  renderCal();document.getElementById('meditov').style.display='none';fbDel(id);
});
document.getElementById('saveeditbtn').addEventListener('click',function(){
  var id=document.getElementById('editid').value;
  var h=document.getElementById('edith').value;
  var t=document.getElementById('editt').value;
  visits=visits.map(function(v){return v.id===id?Object.assign({},v,{herdade:h,tecnico:t,group:HG[h]||v.group}):v;});
  renderCal();document.getElementById('meditov').style.display='none';
  fbSave({id:id,herdade:h,tecnico:t,group:HG[h]||''});
});

// Fechar overlay ao clicar fora
['mdayov','maddov','meditov'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.style.display='none';});
});
</script>
